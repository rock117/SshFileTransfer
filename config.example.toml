# Example config for sftp-download (TOML format)
# Copy to config.toml and edit. Real config.toml is gitignored.
# Usage: cargo run -- --config config.toml
# Any CLI flag overrides the corresponding value here.

host = "xxxx"
port = 22
user = "user1"
password = "passwd123"     # or use `key` below instead
# key = "C:/path/to/id_rsa"
# key_passphrase = "secret"
remote = "/home/logs"
local = "C:/rock/logs"
parallel = 4
timeout = 30
skip = false
resume = false
# Glob patterns matched against file basename (find/rsync style):
#   *  matches any sequence (including empty)
#   ?  matches one char
#   [abc] / [a-z] / [!abc]  character class
# include (whitelist) is applied first; exclude trims from the result.
# ignore_case = true  # case-insensitive matching (default: false)
exclude = ["*.log", "*.tmp"]
# include = ["*.log", "*.txt"]   # if non-empty, only matching files are kept
# Time-based filters (optional). Accept "YYYY-MM-DD" or "YYYY-MM-DD HH:MM:SS".
# since = "2026-06-01"            # only files modified on/after this date
# until = "2026-06-29"            # only files modified on/before this date (end of day)
# latest = 10                     # keep only the N most recently modified files
